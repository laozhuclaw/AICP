<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AICP 授权访问</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        color-scheme: light;
        --ink: #0f2034;
        --muted: #6a7a91;
        --line: rgba(140, 198, 255, 0.24);
        --blue: #1976d2;
        --blue-deep: #084c92;
        --cyan: #7fe8ff;
        --green: #43d17d;
        --panel: rgba(255, 255, 255, 0.92);
        --shadow: 0 30px 90px rgba(3, 19, 42, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(rgba(127, 232, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(127, 232, 255, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 80% 18%, rgba(40, 171, 232, 0.36), transparent 30%),
          radial-gradient(circle at 10% 82%, rgba(39, 122, 216, 0.32), transparent 26%),
          linear-gradient(125deg, #06172c 0%, #0c2d4d 50%, #102846 100%),
          #102846;
        background-size:
          42px 42px,
          42px 42px,
          auto,
          auto,
          auto;
        overflow-x: hidden;
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.08), transparent 34%),
          linear-gradient(0deg, rgba(3, 15, 30, 0.26), transparent 42%);
      }

      main {
        display: grid;
        min-height: 100vh;
        grid-template-columns: minmax(0, 1.02fr) minmax(360px, 0.78fr);
        align-items: center;
        gap: clamp(26px, 4.5vw, 72px);
        padding: clamp(24px, 5vw, 72px);
        position: relative;
        z-index: 1;
      }

      .hero-copy {
        color: #fff;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: clamp(44px, 7vw, 86px);
        font-size: 24px;
        font-weight: 900;
      }

      .brand-mark {
        display: inline-grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 10px;
        color: var(--blue-deep);
        background: #fff;
        font-size: 16px;
        box-shadow: 0 16px 34px rgba(10, 72, 136, 0.28);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--cyan);
        font-size: clamp(22px, 2.4vw, 32px);
        font-weight: 900;
      }

      h1 {
        margin: 0;
        max-width: 720px;
        color: #fff;
        font-size: clamp(52px, 7.4vw, 104px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      h1 span {
        display: block;
      }

      .copy {
        max-width: 680px;
        margin: 24px 0 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: clamp(19px, 2vw, 25px);
        line-height: 1.65;
      }

      .access-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        max-width: 700px;
        margin-top: 38px;
      }

      .access-item {
        min-height: 112px;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        color: #fff;
        background: rgba(255, 255, 255, 0.09);
        backdrop-filter: blur(14px);
      }

      .access-item strong {
        display: block;
        margin-bottom: 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      .access-item span {
        color: rgba(255, 255, 255, 0.72);
        font-size: 15px;
        font-weight: 700;
      }

      .auth-card {
        width: min(520px, 100%);
        justify-self: end;
        padding: clamp(22px, 3vw, 34px);
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .card-label {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 4px 10px;
        border-radius: 8px;
        color: var(--blue-deep);
        background: rgba(25, 118, 210, 0.1);
        font-size: 15px;
        font-weight: 900;
      }

      .auth-card h2 {
        margin: 18px 0 0;
        font-size: clamp(28px, 3vw, 42px);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .card-copy {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 17px;
        font-weight: 700;
        line-height: 1.65;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 26px;
      }

      label {
        color: var(--ink);
        font-size: 17px;
        font-weight: 900;
      }

      input {
        width: 100%;
        min-height: 60px;
        border: 1px solid #c8d9ea;
        border-radius: 8px;
        padding: 0 18px;
        color: var(--ink);
        background: #f7fbff;
        font-size: 22px;
        font-weight: 800;
        outline: none;
      }

      input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 4px rgba(127, 232, 255, 0.15);
      }

      button {
        min-height: 58px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, var(--blue), #0b5aa9);
        box-shadow: 0 18px 34px rgba(25, 118, 210, 0.26);
        font-size: 20px;
        font-weight: 900;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      .hint,
      .error {
        min-height: 26px;
        margin: 0;
        font-size: 16px;
      }

      .hint {
        color: var(--muted);
      }

      .error {
        color: #c8292d;
        font-weight: 800;
      }

      .status-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 22px;
      }

      .status {
        padding: 14px;
        border: 1px solid #dce8f4;
        border-radius: 10px;
        background: #f8fbff;
      }

      .status span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .status strong {
        display: block;
        margin-top: 4px;
        color: var(--ink);
        font-size: 18px;
      }

      .status strong.ok {
        color: #169c52;
      }

      @media (max-width: 980px) {
        main {
          grid-template-columns: 1fr;
          align-items: start;
          gap: 26px;
        }

        .brand {
          margin-bottom: 40px;
        }

        .auth-card {
          justify-self: start;
        }
      }

      @media (max-width: 640px) {
        main {
          padding: 22px;
        }

        .access-list,
        .status-row {
          grid-template-columns: 1fr;
        }

        .auth-card {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero-copy" aria-labelledby="auth-title">
        <div class="brand" aria-label="AICP">
          <span class="brand-mark">AI</span>
          <span>AICP</span>
        </div>
        <p class="eyebrow">授权访问</p>
        <h1 id="auth-title">
          <span>AICP</span>
          <span>闭环赋能体系</span>
        </h1>
        <p class="copy">当前页面仅用于内部演示与节前沟通，支持白名单 IP 直接接入，也支持授权码临时访问。</p>
        <div class="access-list" aria-label="接入方式">
          <div class="access-item">
            <strong>IP 白名单接入</strong>
            <span>可信网络自动放行，适合内部办公网与固定出口。</span>
          </div>
          <div class="access-item">
            <strong>授权码接入</strong>
            <span>临时演示使用授权码进入，访问权限保留 12 小时。</span>
          </div>
        </div>
      </section>

      <section class="auth-card" aria-label="授权码登录">
        <span class="card-label">AICP ACCESS</span>
        <h2>输入授权码进入演示</h2>
        <p class="card-copy">如你的 IP 已在白名单中，系统会直接放行；否则请输入授权码完成临时接入。</p>
        <form id="auth-form" autocomplete="off">
          <label for="access-code">访问授权码</label>
          <input id="access-code" name="access-code" type="password" inputmode="text" placeholder="请输入 AICP" required />
          <button type="submit">进入演示网站</button>
          <p class="hint">授权码：AICP。授权后将在本设备保留 12 小时访问权限。</p>
          <p class="error" id="auth-error" role="status" aria-live="polite"></p>
        </form>
        <div class="status-row" aria-label="访问状态">
          <div class="status">
            <span>接入策略</span>
            <strong>IP / 授权码</strong>
          </div>
          <div class="status">
            <span>页面状态</span>
            <strong class="ok">受控访问</strong>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#auth-form");
      const input = document.querySelector("#access-code");
      const error = document.querySelector("#auth-error");
      const accessToken = "aicp_20260427_authorized_access";

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        error.textContent = "";
        const code = input.value.trim().toUpperCase();

        if (code !== "AICP") {
          error.textContent = "授权码不正确，请确认后重新输入。";
          input.select();
          return;
        }

        document.cookie = `aicp_access=${accessToken}; Max-Age=43200; Path=/aicp/; SameSite=Lax`;
        window.location.href = "/aicp/?v=authorized-20260427";
      });
    </script>
  </body>
</html>
